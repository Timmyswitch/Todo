<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TO-DO LIST APP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
    <script src="./index.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="todo-app">
            <h1>To-Do App</h1>
            <div class="stats-container">
                <div class="details">
                    <h3>Keep it up</h3>
                    <div id="progress-bar">
                        <div id="progress"></div>
                    </div>
                </div>
                <div class="stats-number">
                    <p id="stats"></p>
                </div>
            </div>
            <form id="todo-form" class="input-area">
                <input id="todo-input" type="text" placeholder="Add a new task....">
                <button type="submit" id="add-task-btn"><i class="fa-solid fa-plus"></i></button>
            </form>

            <nav class="filters">

                <button data-filter="all" class="filter-btn active">
                    All
                </button>

                <button data-filter="active" class="filter-btn">
                    Active
                </button>

                <button data-filter="completed" class="filter-btn">
                    Completed
                </button>

            </nav>


            <ul id="todo-list" class="todo-list"></ul>


            <!-- <div class="todos-container">
                <ul id="todoList" class="task-list">
                    <li class="todo-item">
                        <input type="checkbox" class="toggle">

                        <span class="todo-text">Study JS</span>

                        <button class="edit-btn">Edit</button>

                        <button class="delete-btn">Delete</button>
                    </li>
                </ul>
                <img class="empty-image" src="./assets/empty.svg" alt="empty">
            </div> -->
        </div>
    </div>
</body>

</html>
